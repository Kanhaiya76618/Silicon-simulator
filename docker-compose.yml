services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://silicon:canvas@db:5432/silicon_canvas
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: silicon_canvas
      POSTGRES_USER: silicon
      POSTGRES_PASSWORD: canvas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silicon -d silicon_canvas"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
