services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://silicon:canvas@db:5432/silicon_canvas
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ARCHITECT_MODEL: ${ARCHITECT_MODEL:-gpt-5.6}
      RTL_MODEL: ${RTL_MODEL:-gpt-5.6}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      SIMULATOR_URL: http://simulator:8090
    depends_on:
      db:
        condition: service_healthy
      simulator:
        condition: service_started
    networks:
      - default
      - internal

  simulator:
    build:
      context: .
      dockerfile: backend/simulator-worker/Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.5
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: silicon_canvas
      POSTGRES_USER: silicon
      POSTGRES_PASSWORD: canvas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silicon -d silicon_canvas"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    internal: true
