services:
  - type: web
    name: silicon-canvas-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: silicon-canvas-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: SIMULATOR_URL
        fromService:
          type: pserv
          name: silicon-canvas-simulator
          property: hostport
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: pserv
    name: silicon-canvas-simulator
    runtime: docker
    dockerfilePath: ./backend/simulator-worker/Dockerfile
    dockerContext: .

  - type: web
    name: silicon-canvas-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: silicon-canvas-backend
          property: url

databases:
  - name: silicon-canvas-db
    plan: free